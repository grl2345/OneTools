<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#5b5bf5"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.1" r="0.7">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#fafbfc"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark -->
  <rect x="80" y="80" width="140" height="140" rx="30" fill="url(#g)"/>
  <circle cx="150" cy="150" r="32" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <circle cx="150" cy="150" r="6" fill="white"/>

  <!-- Wordmark -->
  <text x="250" y="155" font-family="'Inter','Helvetica Neue',sans-serif" font-weight="800" font-size="92" fill="#0a0b10" letter-spacing="-3">OneTools</text>

  <!-- Tagline -->
  <text x="80" y="320" font-family="'Inter',sans-serif" font-weight="600" font-size="54" fill="#0a0b10" letter-spacing="-1.5">
    Privacy-first developer utilities
  </text>
  <text x="80" y="380" font-family="'Inter',sans-serif" font-weight="400" font-size="30" fill="#4b5162">
    Runs in your browser · Open source · Free forever
  </text>

  <!-- Feature row -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace" font-size="22" fill="#5e667a">
    <rect x="80" y="450" width="1040" height="80" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="110" y="498">{ } JSON  ·  MD Markdown  ·  IMG Compress  ·  ⏱ Timestamp  ·  ✂︎ Remove BG  ·  WM Watermark</text>
  </g>

  <!-- Footer domain -->
  <text x="80" y="580" font-family="ui-monospace,monospace" font-size="22" fill="#7b8194" letter-spacing="1">
    onetools.dev
  </text>
</svg>
